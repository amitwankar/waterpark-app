name: CI + Deploy (Server Pull)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Typecheck and Lint
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies (with dev)
        run: npm ci --include=dev

      - name: Prisma generate
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-24.04
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Deploy via SSH (git pull + prisma + build + pm2 restart)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            APP_ROOT="${{ secrets.SERVER_APP_ROOT }}"
            if [ -z "$APP_ROOT" ]; then
              APP_ROOT="/var/www/waterpark-app"
            fi

            cd "$APP_ROOT"
            git fetch origin main
            git checkout -f main
            git reset --hard origin/main

            cd app
            echo "[deploy] Installing dependencies"
            npm ci --include=dev
            echo "[deploy] Generating Prisma client"
            npx prisma generate

            echo "[deploy] Applying database schema"
            if npx prisma migrate deploy; then
              echo "[deploy] Prisma migrate deploy completed"
            else
              echo "[deploy] Prisma migrate deploy failed or no migrations; falling back to db push"
              npx prisma db push --accept-data-loss
            fi

            echo "[deploy] Seeding database (non-fatal)"
            npx prisma db seed || true

            echo "[deploy] Building Next.js app"
            LOCAL_DISABLE_REDIS=true npm run build

            echo "[deploy] Restarting process manager"
            if command -v pm2 >/dev/null 2>&1; then
              if pm2 describe waterpark >/dev/null 2>&1; then
                pm2 restart waterpark
              else
                pm2 start npm --name waterpark -- start
              fi
              pm2 save
            else
              echo "[deploy] pm2 not found; starting app with nohup fallback"
              pkill -f "next start" || true
              nohup npm run start >/tmp/waterpark.log 2>&1 &
            fi
