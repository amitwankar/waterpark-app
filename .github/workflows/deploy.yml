name: CI + Deploy (Server Pull)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Typecheck and Lint
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies (with dev)
        run: npm ci --include=dev

      - name: Prisma generate
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-24.04
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Deploy via SSH (git pull + prisma + build + pm2 restart)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            APP_ROOT="${{ secrets.SERVER_APP_ROOT }}"
            if [ -z "$APP_ROOT" ]; then
              APP_ROOT="/var/www/waterpark-app"
            fi
            PM2_APP_NAME="waterpark-app"

            log_step() {
              echo ""
              echo "[deploy] $1"
            }

            log_step "Deploy flags"
            echo "[deploy] APP_ROOT=$APP_ROOT"

            log_step "Preparing repository"
            cd "$APP_ROOT"
            git fetch origin main
            git checkout -f main
            git reset --hard origin/main

            log_step "Installing dependencies"
            cd app
            npm ci --include=dev

            log_step "Generating Prisma client"
            npx prisma generate --schema prisma/schema.prisma || echo "[deploy][warn] prisma generate returned non-zero; continuing to build for diagnostics"

            log_step "Applying database schema changes"
            MIGRATE_OK=0
            DBPUSH_OK=0

            if [ -d "prisma/migrations" ] && find prisma/migrations -mindepth 1 -maxdepth 1 -type d | grep -q .; then
              echo "[deploy] Migration folders detected; trying prisma migrate deploy"
              if npx prisma migrate deploy --schema prisma/schema.prisma; then
                MIGRATE_OK=1
                echo "[deploy] prisma migrate deploy succeeded"
              else
                echo "[deploy][warn] prisma migrate deploy failed"
              fi
            else
              echo "[deploy][warn] No prisma migration folders found; skipping migrate deploy"
            fi

            if [ "$MIGRATE_OK" -ne 1 ]; then
              echo "[deploy] Trying prisma db push fallback"
              if npx prisma db push --skip-generate --schema prisma/schema.prisma; then
                DBPUSH_OK=1
                echo "[deploy] prisma db push succeeded"
              else
                echo "[deploy][error] prisma db push failed"
              fi
            else
              DBPUSH_OK=1
            fi

            if [ "$MIGRATE_OK" -ne 1 ] && [ "$DBPUSH_OK" -ne 1 ]; then
              echo "[deploy][error] Both prisma migrate deploy and prisma db push failed"
              exit 1
            fi
            log_step "Seed skipped in CI deploy (production data safety)"

            log_step "Building Next.js app"
            LOCAL_DISABLE_REDIS=true npm run build

            log_step "Restarting process manager"
            if command -v pm2 >/dev/null 2>&1; then
              if pm2 describe "$PM2_APP_NAME" >/dev/null 2>&1; then
                pm2 restart "$PM2_APP_NAME"
              elif pm2 describe waterpark >/dev/null 2>&1; then
                # Legacy process name kept for backward compatibility.
                pm2 restart waterpark
                pm2 rename waterpark "$PM2_APP_NAME"
              else
                # Ensure older plain next processes are stopped before binding the port.
                pkill -f "next start" || true
                pm2 start npm --name "$PM2_APP_NAME" -- start
              fi
              pm2 status
              pm2 save || echo "[deploy][warn] pm2 save failed"
            else
              echo "[deploy] pm2 not found; starting app with nohup fallback"
              pkill -f "next start" || true
              nohup npm run start >/tmp/waterpark.log 2>&1 &
            fi

            log_step "Deploy completed"
