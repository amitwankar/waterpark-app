name: CI + Deploy (Server Pull)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Typecheck and Lint
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies (with dev)
        run: npm ci --include=dev

      - name: Prisma generate
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-24.04
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Deploy via SSH (git pull + prisma + build + pm2 restart)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            APP_ROOT="${{ secrets.SERVER_APP_ROOT }}"
            if [ -z "$APP_ROOT" ]; then
              APP_ROOT="/var/www/waterpark-app"
            fi

            cd "$APP_ROOT"
            git fetch origin main
            git checkout -f main
            git reset --hard origin/main

            cd app
            npm ci --include=dev
            npx prisma generate

            if [ -d prisma/migrations ] && [ -n "$(find prisma/migrations -mindepth 1 -maxdepth 1 -type d -print -quit 2>/dev/null)" ]; then
              echo "Prisma migration directories found: yes"
              npx prisma migrate deploy
            else
              echo "Prisma migration directories found: no. Running prisma db push..."
              npx prisma db push --accept-data-loss
            fi
            npx prisma db seed || true
            LOCAL_DISABLE_REDIS=true npm run build

            if pm2 describe waterpark >/dev/null 2>&1; then
              pm2 restart waterpark
            else
              pm2 start npm --name waterpark -- start
            fi
            pm2 save
